name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 (all backends: Whisper Metal + Parakeet + FluidAudio Neural Engine)
          # macos-15 required for Swift 6.0+ (FluidAudio dependency)
          - platform: macos-15
            args: '--target aarch64-apple-darwin'
            rustflags: ''
          # Linux x86_64 (Whisper with Vulkan GPU acceleration; Parakeet excluded —
          # it now links statically (the old sherpa-rs no-static-archive blocker is
          # gone) but a Parakeet transcription is not yet runtime-verified on a glibc
          # desktop and crashes at model init under the Nix toolchain (#53); FluidAudio
          # is macOS-only). Vulkan is vendor-neutral (NVIDIA/AMD/Intel via the GPU's
          # Vulkan ICD), so one build serves every GPU; whisper.cpp falls back to
          # CPU at runtime when no Vulkan device is present.
          - platform: ubuntu-22.04
            args: '-- --no-default-features --features vulkan'
            rustflags: ''

    # by-exception (2026-07-03): release builds require native platform
    # toolchains — macOS codesigning/Metal/Swift (FluidAudio) and Linux
    # Vulkan/Wayland — which the household self-hosted runner cannot provide.
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install Vulkan SDK (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          # whisper.cpp's GGML Vulkan backend compiles its compute shaders at
          # build time; its CMake requires the glslc compiler
          # (find_package(Vulkan COMPONENTS glslc REQUIRED)) and SPIRV-Headers.
          # The glslc binary is NOT packaged in Ubuntu 22.04 (jammy) — it only
          # appears from noble onward — so the LunarG apt repo is the supported
          # way to get it on a jammy runner. vulkan-sdk supplies glslc, the
          # loader/headers, and the SPIRV headers. At runtime users need only
          # libvulkan.so.1 plus a GPU Vulkan driver.
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc > /dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            http://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          # GUI + audio libs Tauri needs to compile. The Vulkan toolchain is
          # installed by the Vulkan SDK step above.
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # GGML_NATIVE=OFF stops GGML's -march=native from re-enabling the i8mm
          # CPU feature on Apple Silicon and overriding the armv8 baseline below;
          # without it the -march flags alone are insufficient and the build
          # fails on vmmlaq_s32 (i8mm) intrinsics.
          GGML_NATIVE: ${{ matrix.platform == 'macos-15' && 'OFF' || '' }}
          CFLAGS: ${{ matrix.platform == 'macos-15' && '-march=armv8-a' || '' }}
          CXXFLAGS: ${{ matrix.platform == 'macos-15' && '-march=armv8-a' || '' }}
          RUSTFLAGS: ${{ matrix.rustflags }}
        with:
          tagName: v__VERSION__
          releaseName: 'Thoth v__VERSION__'
          releaseBody: 'See the assets below to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Notify failure (ntfy infra)
        if: failure() && github.event_name != 'pull_request'
        shell: bash
        env:
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Inline ntfy notify: thoth is a private repo; composite actions from
          # poodle64/master-project (also private) cannot be resolved at
          # job-setup time. Token from NTFY_TOKEN secret (vendor-hosted runners).
          curl -sS --max-time 10 \
            -H "Authorization: Bearer $NTFY_TOKEN" \
            -H "Title: thoth: release (${{ matrix.platform }}) failed" \
            -H "Priority: 4" \
            -H "Tags: rotating_light" \
            -d "Run: $RUN_URL" \
            "https://ntfy.godswood.au/infra" \
            || echo "::warning::ntfy notify POST failed"
