# Pre-commit hooks configuration for thoth

# Install with: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
# Update hooks: pre-commit autoupdate

repos:
  # ---------------------------------------------------------------------------- #
  #                              Security Scanning                                #
  # ---------------------------------------------------------------------------- #

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: "security - Detect hardcoded secrets"

  # ---------------------------------------------------------------------------- #
  #                              File Validation                                  #
  # ---------------------------------------------------------------------------- #

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
        name: "files - Fix end of files"
      - id: trailing-whitespace
        name: "files - Trim trailing whitespace"
        args: [--markdown-linebreak-ext=md]
      - id: check-yaml
        name: "yaml - Validate YAML syntax"
        args: [--unsafe]
      - id: check-toml
        name: "toml - Validate TOML syntax"
      - id: check-json
        name: "json - Validate JSON syntax"
      - id: check-merge-conflict
        name: "git - Detect conflict markers"
      - id: check-added-large-files
        name: "git - Block large file commits"
        args: ["--maxkb=5000"]
      - id: check-case-conflict
        name: "filesystem - Check case sensitivity"
      - id: detect-private-key
        name: "security - Detect private keys"
